
name: FinTrack CI/CD Pipeline

#Triggers  
on:
  push:
    branches:
      - main          
  pull_request:
    branches:
      - main          

#Environment variables shared across all jobs
env:
  IMAGE_NAME: vamshi292/fintrack-main-fintrack_app

#Jobs
jobs:
  #Job 1: LINT
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install linting dependencies
        run: pip install flake8==6.1.0

      - name: Ensure trailing newlines (prevent W292)
        run: |
          find . -name "*.py" -not -path "./venv/*" \
            -exec sed -i -e '$a\' {} \;

      - name: Run flake8
        run: |
          flake8 app.py tests/ \
            --max-line-length=100 \
            --exclude=venv/,__pycache__/ \
            --statistics


  # Job 2: TEST
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint             

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=50
          # --cov-fail-under=50 → fail the build if coverage drops below 50%

  # Job 3: BUILD & PUSH
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    outputs:
      # Short SHA tag e.g. sha-a1b2c3d — passed to deploy job
      image_tag: ${{ steps.sha.outputs.tag }}
 
    steps:
      - uses: actions/checkout@v4
      - name: Compute short SHA tag
        id: sha
        run: echo "tag=sha-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
 
      - uses: docker/setup-buildx-action@v3
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Pull new image into Minikube
        run: minikube image pull ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
 

      - name: Roll out new image
        run: |
          kubectl set image deployment/fintrack-deployment \
            fintrack=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            --namespace=default

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/fintrack-deployment \
            --namespace=default \
            --timeout=120s
 
      - name: Show running pods
        run: kubectl get pods -l app=fintrack -n default -o wide
 