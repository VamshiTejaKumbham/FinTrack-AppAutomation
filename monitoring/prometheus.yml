global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fintrack'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fintrack_app:5000']
        labels:
          environment: 'local'
          app: 'fintrack'