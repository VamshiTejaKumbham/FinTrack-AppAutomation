apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fintrack-hpa
  namespace: default
  labels:
    app: fintrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fintrack-deployment
  minReplicas: 2    
  maxReplicas: 5    
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: AverageUtilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageUtilization
          averageUtilization: 70    
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    
      policies:
        - type: Pods
          value: 2                      
          periodSeconds: 60             
    scaleDown:
      stabilizationWindowSeconds: 300   
      policies:
        - type: Pods
          value: 1                      
          periodSeconds: 120            