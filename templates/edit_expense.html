{% extends "base.html" %}

{% block title %}Edit Expense - FinTrack{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">

    <!-- Header -->
    <div class="mb-7">
        <a href="{{ url_for('expenses') }}" class="inline-flex items-center gap-1.5 text-xs text-slate-500 hover:text-slate-300 transition-colors mb-4">
            <i class="fas fa-arrow-left text-xs"></i> Back to Expenses
        </a>
        <h1 class="font-display font-700 text-2xl text-white tracking-tight">Edit Expense</h1>
        <p class="text-slate-500 text-sm mt-0.5">Update your transaction details</p>
    </div>

    <!-- Form Card -->
    <div class="rounded-xl border border-slate-800 bg-slate-900/70 backdrop-blur-sm p-6 shadow-2xl">
        <form method="POST" class="space-y-5">

            <!-- Amount + Date Row -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="amount" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                        Amount (₹)
                    </label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">₹</span>
                        <input type="number"
                               step="0.01"
                               id="amount"
                               name="amount"
                               value="{{ expense.amount }}"
                               required
                               class="w-full pl-7 pr-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white placeholder-slate-600 text-sm
                                      focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    </div>
                </div>
                <div>
                    <label for="date" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Date</label>
                    <input type="date"
                           id="date"
                           name="date"
                           value="{{ expense.date.strftime('%Y-%m-%d') }}"
                           required
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white text-sm
                                  focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all
                                  [color-scheme:dark]">
                </div>
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Description</label>
                <input type="text"
                       id="description"
                       name="description"
                       value="{{ expense.description }}"
                       required
                       class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white placeholder-slate-600 text-sm
                              focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
            </div>

            <!-- Category -->
            <div>
                <label for="category" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Category</label>
                <select id="category"
                        name="category"
                        required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white text-sm
                               focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all
                               [color-scheme:dark]">
                    <option value="">Select a category…</option>
                    <option value="Food" {{ 'selected' if expense.category == 'Food' }}>🍽️  Food</option>
                    <option value="Transportation" {{ 'selected' if expense.category == 'Transportation' }}>🚗  Transportation</option>
                    <option value="Entertainment" {{ 'selected' if expense.category == 'Entertainment' }}>🎬  Entertainment</option>
                    <option value="Shopping" {{ 'selected' if expense.category == 'Shopping' }}>🛍️  Shopping</option>
                    <option value="Bills" {{ 'selected' if expense.category == 'Bills' }}>💡  Bills</option>
                    <option value="Healthcare" {{ 'selected' if expense.category == 'Healthcare' }}>🏥  Healthcare</option>
                    <option value="Education" {{ 'selected' if expense.category == 'Education' }}>📚  Education</option>
                    <option value="Travel" {{ 'selected' if expense.category == 'Travel' }}>✈️  Travel</option>
                    <option value="Other" {{ 'selected' if expense.category == 'Other' }}>📦  Other</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-3 pt-2 border-t border-slate-800">
                <a href="{{ url_for('expenses') }}"
                   class="px-4 py-2 rounded-lg border border-slate-700 bg-transparent text-slate-400 hover:text-white hover:border-slate-600 font-semibold text-sm transition-all">
                    Cancel
                </a>
                <button type="submit"
                        class="inline-flex items-center gap-2 px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm transition-all shadow-glow">
                    <i class="fas fa-check text-xs"></i>
                    Update Expense
                </button>
            </div>

        </form>
    </div>

</div>
{% endblock %}
