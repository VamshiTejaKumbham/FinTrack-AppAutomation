{% extends "base.html" %}

{% block title %}Create Account - FinTrack{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center">
    <div class="w-full max-w-sm">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-emerald-500/15 border border-emerald-500/30 mb-4">
                <i class="fas fa-user-plus text-emerald-400 text-lg"></i>
            </div>
            <h1 class="font-display font-700 text-2xl text-white tracking-tight">Create account</h1>
            <p class="text-slate-500 text-sm mt-1">Start tracking your expenses today</p>
        </div>

        <!-- Card -->
        <div class="rounded-xl border border-slate-800 bg-slate-900/80 backdrop-blur-sm shadow-2xl p-7">
            <form method="POST" class="space-y-5">

                <div>
                    <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                    <input type="text"
                           id="username"
                           name="username"
                           required
                           autofocus
                           placeholder="choose_a_username"
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white placeholder-slate-600 text-sm
                                  focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all duration-150">
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                    <input type="email"
                           id="email"
                           name="email"
                           required
                           placeholder="you@example.com"
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white placeholder-slate-600 text-sm
                                  focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all duration-150">
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           required
                           placeholder="••••••••"
                           class="w-full px-4 py-2.5 rounded-lg border border-slate-700 bg-slate-800/60 text-white placeholder-slate-600 text-sm
                                  focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all duration-150">
                </div>

                <button type="submit"
                        class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white font-semibold text-sm
                               transition-all duration-150 shadow-glow-emerald hover:shadow-lg mt-2">
                    <i class="fas fa-rocket text-xs opacity-80"></i>
                    Create Account
                </button>

            </form>
        </div>

        <!-- Login link -->
        <p class="text-center text-sm text-slate-500 mt-5">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1 transition-colors">Sign in</a>
        </p>

    </div>
</div>
{% endblock %}
