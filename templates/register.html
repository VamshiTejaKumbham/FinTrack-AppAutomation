{% extends "base.html" %}

{% block title %}Create Account - FinTrack{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-4rem)]">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">Get Started</h2>
            <p class="text-slate-400">Start tracking expenses today</p>
        </div>
        
        <div class="card p-8">
            <form method="POST" class="space-y-5">
                <div>
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div>
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-full justify-center">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="text-center mt-6">
                <p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="text-indigo-400 hover:text-indigo-300 font-semibold">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
