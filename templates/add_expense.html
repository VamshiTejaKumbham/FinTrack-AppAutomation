{% extends "base.html" %}

{% block title %}Add Expense - FinTrack{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <h2 class="mb-8">Add New Expense</h2>
    
    <div class="card p-8">
        <form method="POST" class="space-y-6">
            <!-- Amount & Date -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="amount" class="form-label">Amount (₹)</label>
                    <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="0.00" required>
                </div>
                <div>
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
            </div>
            
            <!-- Description -->
            <div>
                <label for="description" class="form-label">Description</label>
                <input type="text" class="form-control" id="description" name="description" placeholder="What was this expense for?" required>
            </div>
            
            <!-- Category -->
            <div>
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category" name="category" required>
                    <option value="">Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Travel">Travel</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-4 justify-end pt-4">
                <a href="{{ url_for('expenses') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Add Expense
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
