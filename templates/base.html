<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            @apply transition-colors duration-200;
        }
        
        body {
            @apply bg-slate-950 text-slate-100 antialiased;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* Navbar */
        nav {
            @apply border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-50;
        }
        
        .navbar-brand {
            @apply text-xl font-bold text-indigo-400 flex items-center gap-2;
        }
        
        .nav-link {
            @apply text-slate-300 font-medium text-sm hover:text-indigo-400 px-3 py-2 rounded-lg transition-colors;
        }
        
        .nav-link.active {
            @apply text-indigo-400 bg-indigo-400/10;
        }
        
        /* Cards */
        .card {
            @apply bg-slate-800/50 border border-slate-700 rounded-xl shadow-lg hover:shadow-xl transition-shadow overflow-hidden;
        }
        
        .card-header {
            @apply px-6 py-4 border-b border-slate-700 bg-slate-800/30;
        }
        
        .card-header h5 {
            @apply text-lg font-bold text-slate-100 m-0;
        }
        
        .card-body {
            @apply p-6;
        }
        
        /* Buttons */
        .btn {
            @apply inline-flex items-center gap-2 px-4 py-2 rounded-lg font-semibold text-sm transition-all duration-200;
        }
        
        .btn-primary {
            @apply bg-indigo-600 text-white hover:bg-indigo-500 active:scale-95 shadow-lg hover:shadow-indigo-500/30;
        }
        
        .btn-secondary {
            @apply bg-slate-700 text-slate-200 hover:bg-slate-600 active:scale-95;
        }
        
        .btn-sm {
            @apply px-3 py-1.5 text-xs;
        }
        
        .btn-outline-primary {
            @apply text-indigo-400 border border-indigo-400 hover:bg-indigo-400/10;
        }
        
        .btn-outline-danger {
            @apply text-red-400 border border-red-400 hover:bg-red-400/10;
        }
        
        /* Forms */
        .form-control, .form-select {
            @apply w-full px-4 py-2.5 bg-slate-700/50 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all;
        }
        
        .form-label {
            @apply block text-sm font-semibold text-slate-300 mb-2;
        }
        
        /* Tables */
        .table {
            @apply w-full text-sm;
        }
        
        .table thead th {
            @apply bg-slate-700/50 px-4 py-3 text-left font-bold text-slate-200 border-b border-slate-600;
        }
        
        .table tbody td {
            @apply px-4 py-3 border-b border-slate-700;
        }
        
        .table tbody tr {
            @apply hover:bg-slate-700/30 transition-colors;
        }
        
        /* Badges */
        .badge {
            @apply inline-block px-3 py-1 rounded-full text-xs font-semibold bg-indigo-500/20 text-indigo-300;
        }
        
        /* Alerts */
        .alert {
            @apply px-4 py-3 rounded-lg border flex items-start justify-between;
        }
        
        .alert-info {
            @apply bg-indigo-500/10 border-indigo-500/30 text-indigo-200;
        }
        
        .btn-close {
            @apply text-slate-400 hover:text-slate-200 cursor-pointer;
        }
        
        /* Headings */
        h1, h2, h3, h4, h5, h6 {
            @apply text-slate-100 font-bold;
        }
        
        h1 {
            @apply text-3xl mb-6;
        }
        
        h2 {
            @apply text-2xl mb-6;
        }
        
        /* Progress bars */
        .progress {
            @apply w-full h-1.5 bg-slate-700 rounded-full overflow-hidden;
        }
        
        .progress-bar {
            @apply bg-gradient-to-r from-emerald-500 to-indigo-500 h-full;
        }
        
        /* Stat cards */
        .stat-card {
            @apply bg-slate-800/60 border border-slate-700 rounded-xl p-6 text-center hover:border-indigo-500/50 transition-colors;
        }
        
        .stat-card h3 {
            @apply text-3xl font-bold text-indigo-400 mb-1;
        }
        
        .stat-card p {
            @apply text-slate-400 m-0;
        }
        
        .stat-card i {
            @apply text-2xl mb-3;
        }
        
        /* Pagination */
        .pagination {
            @apply flex gap-2 justify-center;
        }
        
        .page-link {
            @apply px-3 py-2 rounded-lg text-indigo-400 border border-slate-600 hover:bg-slate-700/50 transition-colors;
        }
        
        .page-item.active .page-link {
            @apply bg-indigo-600 text-white border-indigo-600;
        }
        
        .page-item.disabled .page-link {
            @apply text-slate-500 cursor-not-allowed;
        }
        
        /* Utility */
        main {
            @apply container mx-auto px-4 py-8 max-w-7xl;
        }
    </style>
</head>
<body>
    <!-- Modern FinTech Navbar -->
    <nav class="border-b border-slate-800">
        <div class="container mx-auto px-4 max-w-7xl">
            <div class="flex items-center justify-between h-16">
                <!-- Brand -->
                <a href="{{ url_for('index') }}" class="navbar-brand">
                    <i class="fas fa-wallet text-indigo-400"></i>
                    <span>FinTrack</span>
                </a>
                
                {% if current_user.is_authenticated %}
                <!-- Navigation Links -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                        Dashboard
                    </a>
                    <a href="{{ url_for('expenses') }}" class="nav-link {% if request.endpoint == 'expenses' %}active{% endif %}">
                        Expenses
                    </a>
                    <a href="{{ url_for('add_expense') }}" class="nav-link {% if request.endpoint == 'add_expense' %}active{% endif %}">
                        Add Expense
                    </a>
                    <a href="{{ url_for('analytics') }}" class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}">
                        Analytics
                    </a>
                </div>
                
                <!-- User Menu -->
                <div class="flex items-center gap-4">
                    <div class="relative group">
                        <button class="text-slate-300 hover:text-indigo-400 flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-700/50">
                            <i class="fas fa-user-circle"></i>
                            <span class="text-sm font-medium">{{ current_user.username }}</span>
                        </button>
                        <div class="absolute right-0 mt-0 w-48 bg-slate-800 border border-slate-700 rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                            <a href="{{ url_for('export_csv') }}" class="block px-4 py-2 text-slate-300 hover:text-indigo-400 hover:bg-slate-700/50 first:rounded-t-lg">
                                <i class="fas fa-download me-2"></i>Export CSV
                            </a>
                            <a href="{{ url_for('logout') }}" class="block px-4 py-2 text-slate-300 hover:text-red-400 hover:bg-slate-700/50 last:rounded-b-lg border-t border-slate-700">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout
                            </a>
                        </div>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info mb-6" role="alert">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-check-circle"></i>
                            <span>{{ message }}</span>
                        </div>
                        <button type="button" class="btn-close" onclick="this.parentElement.style.display='none';">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
